<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Glassmorphism Kun/Tun Tugmasi</title>
    <style>
        /* Asosiy sahifa sozlamalari */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f2029 0%, #15161c 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #e0e5ec 0%, #ffffff 100%);
        }

        h1 {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            transition: color 1s ease, text-shadow 1s ease;
        }

        body.light-mode h1 {
            color: rgba(0, 0, 0, 0.6);
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        /* Checkbox yashirilgan */
        #theme-toggle {
            display: none;
        }

        /* 3D Asos (Track) */
        .toggle-track {
            position: relative;
            width: 460px;
            height: 180px;
            border-radius: 90px;
            box-shadow: 
                inset 8px 8px 20px rgba(0, 0, 0, 0.6), 
                inset -8px -8px 20px rgba(255, 255, 255, 0.05),
                0 0 0 10px rgba(90, 79, 136, 0.15),
                0 20px 40px rgba(0,0,0,0.4);
            cursor: pointer;
            overflow: hidden;
            background: #14151a;
            transition: box-shadow 0.8s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body.light-mode .toggle-track {
            box-shadow: 
                inset 8px 8px 20px rgba(0, 0, 0, 0.15), 
                inset -8px -8px 20px rgba(255, 255, 255, 0.8),
                0 0 0 10px rgba(56, 163, 209, 0.15),
                0 20px 40px rgba(0,0,0,0.1);
        }

        /* ================= 3D QATLAM VA ANIMATSIYALAR ================= */
        .day-el, .night-el {
            position: absolute;
            transition: transform 1s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.8s ease;
        }
        
        /* Boshlang'ich holatlar */
        .day-el {
            opacity: 1;
            transform: translateY(0);
        }
        .night-el {
            opacity: 0;
            transform: translateY(20px);
        }

        /* Tungi rejim yoqilganda */
        #theme-toggle:checked ~ .toggle-track .day-el {
            opacity: 0;
            transform: translateY(-30px) scale(0.95);
        }
        #theme-toggle:checked ~ .toggle-track .night-el {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ================= Z-INDEX 1: ORQA FONLAR ================= */
        .bg-day, .bg-night {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 1s ease;
            z-index: 1;
        }
        .bg-day { background: linear-gradient(180deg, #5fc3fa 0%, #a6e3fc 100%); opacity: 1; }
        .bg-night { background: linear-gradient(180deg, #10121f 0%, #212542 100%); opacity: 0; }
        #theme-toggle:checked ~ .toggle-track .bg-day { opacity: 0; }
        #theme-toggle:checked ~ .toggle-track .bg-night { opacity: 1; }

        /* ================= Z-INDEX 2: OSMON JAVOHIRLARI ================= */
        .sun {
            top: 20px; left: 50px; width: 60px; height: 60px;
            background: radial-gradient(circle, #fffca8 0%, #ffdf00 100%);
            border-radius: 50%; box-shadow: 0 0 30px #ffdf00, 0 0 60px #ffdf00;
            z-index: 2;
        }
        .moon {
            top: 30px; left: 200px; width: 55px; height: 55px;
            background: radial-gradient(circle, #ffffff 0%, #e0e5ec 100%);
            border-radius: 50%; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 0 0 20px rgba(255,255,255,0.4);
            z-index: 2;
        }
        .moon::before { content: ''; position: absolute; top: 15px; left: 15px; width: 10px; height: 10px; background: rgba(0,0,0,0.1); border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2); }
        .moon::after { content: ''; position: absolute; top: 30px; left: 35px; width: 15px; height: 15px; background: rgba(0,0,0,0.1); border-radius: 50%; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2); }
        
        .stars {
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(2px 2px at 100px 50px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 350px 80px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 400px 40px, #fff, rgba(0,0,0,0));
            animation: twinkle 3s infinite alternate;
            z-index: 2;
        }

        /* ================= Z-INDEX 3: BULUTLAR ================= */
        .cloud-group {
            width: 100%; height: 100%;
            animation: cloudMove 20s infinite linear;
            z-index: 3;
        }
        .cloud { position: absolute; background: white; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); filter: drop-shadow(0 4px 4px rgba(0,0,0,0.05)); }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        .c1 { top: 40px; left: 100px; width: 80px; height: 25px; opacity: 0.9;}
        .c1::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .c1::after { width: 30px; height: 30px; top: -10px; left: 45px; }
        .c2 { top: 70px; left: 250px; width: 100px; height: 30px; opacity: 0.7; transform: scale(0.8);}
        .c2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .c2::after { width: 40px; height: 40px; top: -15px; left: 55px; }

        /* ================= Z-INDEX 4: ULTRA SHAFFOF GLASS TUGMA ================= */
        .glass-knob {
            position: absolute; top: 10px; left: 10px;
            width: 160px; height: 160px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 2px 2px 5px rgba(255, 255, 255, 0.6), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 4; /* Old fon elementlaridan ORQADA turadi */
            transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.8s ease;
        }
        
        #theme-toggle:checked ~ .toggle-track .glass-knob {
            transform: translateX(280px);
            background: linear-gradient(135deg, rgba(200, 200, 255, 0.2) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 2px 2px 5px rgba(255, 255, 255, 0.3), inset -2px -2px 5px rgba(0, 0, 0, 0.3);
        }

        /* ================= Z-INDEX 5: OLD QATLAM (Suv, Sohil, Mayoq, Qayiq) ================= */
        .water {
            bottom: 0; width: 100%; height: 55px;
            background: linear-gradient(180deg, rgba(46, 168, 224, 0.7) 0%, #1579b3 100%);
            backdrop-filter: blur(5px); border-top: 2px solid rgba(255,255,255,0.4);
            border-radius: 0 0 90px 90px; z-index: 5;
        }
        .boat {
            bottom: 40px; left: 160px; width: 70px; height: 70px;
            animation: float 4s infinite ease-in-out; z-index: 5;
        }
        .coast {
            bottom: 0; width: 100%; height: 45px;
            background: linear-gradient(180deg, #1a172c 0%, #0d0a17 100%);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-radius: 0 0 90px 90px; z-index: 5;
        }
        .lighthouse-group {
            bottom: 30px; right: 50px; width: 60px; height: 90px;
            z-index: 5; /* Glass knobdan ustida joylashadi */
        }
        
        /* NURNI TO'G'RILASH (Beam) */
        .beam {
            position: absolute;
            top: -6px; /* Mayoqning chirog'i balandligi bilan bir hil */
            right: 30px; /* Aynan chiroqning o'rtasidan chiqadi */
            width: 250px;
            height: 60px;
            background: linear-gradient(270deg, rgba(255, 252, 219, 0.8) 0%, rgba(255, 252, 219, 0) 100%);
            clip-path: polygon(0 0, 100% 45%, 100% 55%, 0 100%);
            transform-origin: right center;
            animation: sweepLight 6s infinite ease-in-out alternate;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        /* ================= ANIMATSIYALAR ================= */
        @keyframes cloudMove { 0% { transform: translateX(-50px); } 100% { transform: translateX(100px); } }
        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes sweepLight { 
            0% { transform: rotate(10deg); opacity: 0.3; } 
            100% { transform: rotate(-25deg); opacity: 0.9; } 
        }

    </style>
</head>
<body class="light-mode">

    <h1 id="mode-text">Kunduzgi Rejim</h1>

    <input type="checkbox" id="theme-toggle">
    <label for="theme-toggle" class="toggle-track">
        
        <!-- Z-INDEX 1: Orqa Fonlar -->
        <div class="bg-day"></div>
        <div class="bg-night"></div>

        <!-- Z-INDEX 2: Osmon jismlari (Quyosh, Oy, Yulduzlar) -->
        <div class="day-el sun"></div>
        <div class="night-el stars"></div>
        <div class="night-el moon"></div>

        <!-- Z-INDEX 3: Bulutlar -->
        <div class="day-el cloud-group">
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>
        </div>

        <!-- Z-INDEX 4: Oyna tugmasi (Endi suv va mayoq orqasida siljiydi) -->
        <div class="glass-knob"></div>

        <!-- Z-INDEX 5: Old elementlar (Suv, Qayiq, Sohil, Mayoq) -->
        <div class="day-el water"></div>
        <svg class="day-el boat" viewBox="0 0 100 100">
            <polygon points="50,10 80,65 50,65" fill="rgba(255,255,255,0.7)" />
            <polygon points="45,15 15,65 45,65" fill="#ffffff" filter="drop-shadow(2px 0px 2px rgba(0,0,0,0.1))"/>
            <path d="M10,70 L85,70 L75,85 L20,85 Z" fill="#e74c3c" />
            <line x1="15" y1="75" x2="80" y2="75" stroke="#fff" stroke-width="2"/>
        </svg>

        <div class="night-el coast"></div>
        <div class="night-el lighthouse-group">
            <!-- To'g'rilangan Nur -->
            <div class="beam"></div>
            <!-- Mayoq -->
            <svg viewBox="0 0 100 200" width="100%" height="100%" filter="drop-shadow(0 10px 10px rgba(0,0,0,0.5))">
                <polygon points="30,200 70,200 60,60 40,60" fill="#2c2a38" />
                <polygon points="35,160 65,160 63,130 37,130" fill="#1f1c29" />
                <polygon points="38,100 62,100 60,70 40,70" fill="#1f1c29" />
                <rect x="35" y="45" width="30" height="15" fill="#111" />
                <rect x="42" y="48" width="16" height="10" fill="#fffcdb" filter="drop-shadow(0 0 5px #fffcdb)" />
                <polygon points="50,15 75,45 25,45" fill="#111" />
            </svg>
        </div>

    </label>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const text = document.getElementById('mode-text');

        toggle.addEventListener('change', () => {
            if (toggle.checked) {
                body.classList.remove('light-mode');
                text.textContent = "Tungi Rejim";
                text.style.transform = "scale(1.05)";
                setTimeout(() => text.style.transform = "scale(1)", 300);
            } else {
                body.classList.add('light-mode');
                text.textContent = "Kunduzgi Rejim";
                text.style.transform = "scale(1.05)";
                setTimeout(() => text.style.transform = "scale(1)", 300);
            }
        });
    </script>
</body>
</html>
